<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Admin - Blue Lock MG</title>
<style>
    :root {
        --rouge: #D62828;
        --bleu: #003F88;
        --blanc: #FFFFFF;
        --gris-clair: #F4F4F9;
        --vert: #28a745;
    }
    * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Segoe UI', Arial, sans-serif; }
    body { background: var(--gris-clair); }

    @keyframes slideUp { from { opacity: 0; transform: translateY(20px); } to { opacity: 1; transform: translateY(0); } }
    @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }

   .modal {
        display: none;
        position: fixed;
        top: 0; left: 0; right: 0; bottom: 0;
        background: rgba(0,0,0,0.5);
        z-index: 1000;
        align-items: center;
        justify-content: center;
        animation: fadeIn 0.3s;
    }
   .modal.active { display: flex; }
   .modal-box {
        background: var(--blanc);
        padding: 30px;
        border-radius: 16px;
        max-width: 350px;
        text-align: center;
        animation: slideUp 0.3s;
    }

    #admin-login {
        background: linear-gradient(135deg, var(--bleu) 0%, var(--rouge) 100%);
        min-height: 100vh;
        display: flex;
        align-items: center;
        justify-content: center;
        padding: 20px;
    }
   .login-box {
        background: var(--blanc);
        border-radius: 16px;
        padding: 40px 30px;
        width: 100%;
        max-width: 400px;
        box-shadow: 0 10px 40px rgba(0,0,0,0.3);
        animation: slideUp 0.5s;
    }
    input, textarea {
        width: 100%;
        padding: 14px 16px;
        border: 2px solid #e0e0e0;
        border-radius: 8px;
        margin-bottom: 16px;
    }
    button {
        width: 100%;
        padding: 14px;
        background: linear-gradient(135deg, var(--rouge), #b81f1f);
        color: var(--blanc);
        border: none;
        border-radius: 8px;
        font-weight: 600;
        cursor: pointer;
    }
    button:hover { transform: translateY(-2px); }
   .btn-small { padding: 8px 16px; width: auto; background: var(--vert); }
   .btn-danger { background: var(--rouge); }

    #admin-dashboard { display: none; }
   .admin-header { background: var(--bleu); color: var(--blanc); padding: 20px; }
   .admin-tabs {
        display: flex;
        background: var(--blanc);
        overflow-x: auto;
        position: sticky;
        top: 0;
        z-index: 99;
    }
   .tab-btn {
        flex: 1;
        padding: 16px 20px;
        text-align: center;
        cursor: pointer;
        font-weight: 500;
        border-bottom: 3px solid transparent;
    }
   .tab-btn.active { color: var(--rouge); border-bottom-color: var(--rouge); }
   .tab-content { display: none; padding: 20px; animation: slideUp 0.4s; }
   .tab-content.active { display: block; }
   .card {
        background: var(--blanc);
        border-radius: 12px;
        padding: 20px;
        margin-bottom: 16px;
        box-shadow: 0 2px 8px rgba(0,0,0,0.08);
    }
   .request-item {
        border: 1px solid var(--gris-clair);
        border-radius: 10px;
        padding: 15px;
        margin-bottom: 12px;
    }
   .request-item.pending { border-left: 4px solid orange; }
   .request-item.confirmed { border-left: 4px solid var(--vert); opacity: 0.7; }
   .badge {
        background: var(--rouge);
        color: var(--blanc);
        padding: 4px 10px;
        border-radius: 12px;
        font-size: 0.8em;
        display: inline-block;
        margin-top: 5px;
    }
</style>
</head>
<body>

<div class="modal" id="modal">
    <div class="modal-box">
        <h3 id="modal-title">Succès</h3>
        <p id="modal-text"></p>
        <button onclick="closeModal()">OK</button>
    </div>
</div>

<div id="admin-login">
    <div class="login-box">
        <h1>🔐 Admin Panel</h1>
        <input type="text" id="admin-user" placeholder="Email admin">
        <input type="password" id="admin-pass" placeholder="Mot de passe">
        <button onclick="adminLogin()">Se connecter</button>
        <p style="text-align: center; margin-top: 15px; color: #666;">Admin: admin@bluelock.mg</p>
    </div>
</div>

<div id="admin-dashboard">
    <div class="admin-header">
        <h2>Blue Lock MG - Admin</h2>
    </div>

    <div class="admin-tabs">
        <div class="tab-btn active" onclick="showTab('users')">👥 Utilisateurs</div>
        <div class="tab-btn" onclick="showTab('exchanges')">💎 Échanges</div>
        <div class="tab-btn" onclick="showTab('blog')">📝 Blog</div>
        <div class="tab-btn" onclick="showTab('defi')">⚡ Défis</div>
    </div>

    <div class="tab-content active" id="tab-users">
        <div class="card">
            <h3>Utilisateurs inscrits</h3>
            <div id="users-list"></div>
        </div>
    </div>

    <div class="tab-content" id="tab-exchanges">
        <div class="card">
            <h3>Demandes d'échange</h3>
            <div id="exchanges-list"></div>
        </div>
    </div>

    <div class="tab-content" id="tab-blog">
        <div class="card">
            <h3>Ajouter un article Blog</h3>
            <input type="text" id="blog-title" placeholder="Titre">
            <textarea id="blog-desc" placeholder="Description"></textarea>
            <input type="url" id="blog-link" placeholder="Lien Google">
            <button onclick="addBlog()">Publier</button>
        </div>
    </div>

    <div class="tab-content" id="tab-defi">
        <div class="card">
            <h3>Créer un défi</h3>
            <input type="text" id="defi-title" placeholder="Titre du défi">
            <textarea id="defi-desc" placeholder="Description"></textarea>
            <input type="number" id="defi-reward" placeholder="Récompense tokens" value="5">
            <button onclick="addDefi()">Ajouter</button>
        </div>
    </div>
</div>

<script>
const API = 'http://localhost:3000/api';

function showModal(title, text) {
    document.getElementById('modal-title').textContent = title;
    document.getElementById('modal-text').textContent = text;
    document.getElementById('modal').classList.add('active');
}
function closeModal() { document.getElementById('modal').classList.remove('active'); }

async function adminLogin() {
    const email = document.getElementById('admin-user').value;
    const password = document.getElementById('admin-pass').value;
    const res = await fetch(API + '/login', {
        method: 'POST', headers: {'Content-Type':'application/json'}, credentials: 'include',
        body: JSON.stringify({ email, password })
    });
    const data = await res.json();
    if (data.success && data.user.email === 'admin@bluelock.mg') {
        document.getElementById('admin-login').style.display = 'none';
        document.getElementById('admin-dashboard').style.display = 'block';
        loadDashboard();
    } else {
        showModal('Erreur', 'Identifiants admin incorrects!');
    }
}

function showTab(tab) {
    document.querySelectorAll('.tab-btn').forEach(btn => btn.classList.remove('active'));
    document.querySelectorAll('.tab-content').forEach(content => content.classList.remove('active'));
    event.target.classList.add('active');
    document.getElementById('tab-' + tab).classList.add('active');
    if (tab === 'exchanges') loadExchanges();
    if (tab === 'users') loadDashboard();
}

async function loadDashboard() {
    const res = await fetch(API + '/admin/users', { credentials: 'include' });
    const data = await res.json();
    if (!data.users) return document.getElementById('users-list').innerHTML = '<p>Non autorisé</p>';
    document.getElementById('users-list').innerHTML = data.users.map(u => `
        <div class="request-item">
            <strong>${u.name}</strong>
            <p>Email: ${u.email}</p>
            <p>Tokens: <span class="badge">${u.tokens}</span></p>
            <input type="number" id="token-${u.id}" placeholder="Tokens" style="width: 100px; margin: 10px 0;">
            <button class="btn-small" onclick="giveTokens('${u.email}', ${u.id})">Offrir Tokens</button>
        </div>
    `).join('') || '<p>Aucun utilisateur.</p>';
}

async function giveTokens(email, id) {
    const amount = parseInt(document.getElementById(`token-${id}`).value);
    if (!amount || amount <= 0) return showModal('Erreur', 'Montant invalide!');
    const res = await fetch(API + '/admin/give-tokens', {
        method: 'POST', headers: {'Content-Type':'application/json'}, credentials: 'include',
        body: JSON.stringify({ email, amount })
    });
    const data = await res.json();
    showModal(data.success? 'Succès' : 'Erreur', data.success? `${amount} tokens offerts` : data.error);
    if (data.success) loadDashboard();
}

async function loadExchanges() {
    const res = await fetch(API + '/admin/exchanges', { credentials: 'include' });
    const data = await res.json();
    if (!data.exchanges) return document.getElementById('exchanges-list').innerHTML = '<p>Non autorisé</p>';
    if (data.exchanges.length === 0) return document.getElementById('exchanges-list').innerHTML = '<p>Aucune demande.</p>';
    document.getElementById('exchanges-list').innerHTML = data.exchanges.map(e => `
        <div class="request-item ${e.status === 'confirme'? 'confirmed' : 'pending'}">
            <strong>${e.reward} ${e.game.toUpperCase()}</strong>
            <p><strong>User:</strong> ${e.name} (${e.email})</p>
            <p><strong>UID:</strong> ${e.uid}</p>
            <p><strong>Pseudo:</strong> ${e.pseudo}</p>
            <p><strong>Statut:</strong> ${e.status}</p>
            <small>${new Date(e.created_at).toLocaleString('fr-FR')}</small>
            ${e.status === 'en_attente'? `<button class="btn-small" onclick="confirmExchange(${e.id})">Confirmer</button>` : ''}
        </div>
    `).join('');
}

async function confirmExchange(id) {
    const res = await fetch(API + '/admin/confirm', {
        method: 'POST', headers: {'Content-Type':'application/json'}, credentials: 'include',
        body: JSON.stringify({ id })
    });
    const data = await res.json();
    showModal(data.success? 'Confirmé' : 'Erreur', data.success? 'Échange validé!' : data.error);
    if (data.success) loadExchanges();
}

function addBlog() { showModal('Info', 'Pas encore implémenté côté backend'); }
function addDefi() { showModal('Info', 'Pas encore implémenté côté backend'); }
</script>
</body>
              </html>
