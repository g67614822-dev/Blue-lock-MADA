<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Admin - Blue Lock MG</title>
<style>
    :root {
        --rouge: #D62828;
        --bleu: #003F88;
        --blanc: #FFFFFF;
        --gris-clair: #F4F4F9;
        --vert: #28a745;
    }
    * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Segoe UI', Arial, sans-serif; }
    body { background: var(--gris-clair); }

    @keyframes slideUp { from { opacity: 0; transform: translateY(20px); } to { opacity: 1; transform: translateY(0); } }
    @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }

    /* Modal */
   .modal {
        display: none;
        position: fixed;
        top: 0; left: 0; right: 0; bottom: 0;
        background: rgba(0,0,0,0.5);
        z-index: 1000;
        align-items: center;
        justify-content: center;
        animation: fadeIn 0.3s;
    }
   .modal.active { display: flex; }
   .modal-box {
        background: var(--blanc);
        padding: 30px;
        border-radius: 16px;
        max-width: 350px;
        text-align: center;
        animation: slideUp 0.3s;
    }

    #admin-login {
        background: linear-gradient(135deg, var(--bleu) 0%, var(--rouge) 100%);
        min-height: 100vh;
        display: flex;
        align-items: center;
        justify-content: center;
        padding: 20px;
    }
   .login-box {
        background: var(--blanc);
        border-radius: 16px;
        padding: 40px 30px;
        width: 100%;
        max-width: 400px;
        box-shadow: 0 10px 40px rgba(0,0,0,0.3);
        animation: slideUp 0.5s;
    }
    input, textarea {
        width: 100%;
        padding: 14px 16px;
        border: 2px solid #e0e0e0;
        border-radius: 8px;
        margin-bottom: 16px;
    }
    button {
        width: 100%;
        padding: 14px;
        background: linear-gradient(135deg, var(--rouge), #b81f1f);
        color: var(--blanc);
        border: none;
        border-radius: 8px;
        font-weight: 600;
        cursor: pointer;
    }
    button:hover { transform: translateY(-2px); }
   .btn-small { padding: 8px 16px; width: auto; background: var(--vert); }
   .btn-danger { background: var(--rouge); }

    #admin-dashboard { display: none; }
   .admin-header { background: var(--bleu); color: var(--blanc); padding: 20px; }
   .admin-tabs {
        display: flex;
        background: var(--blanc);
        overflow-x: auto;
        position: sticky;
        top: 0;
        z-index: 99;
    }
   .tab-btn {
        flex: 1;
        padding: 16px 20px;
        text-align: center;
        cursor: pointer;
        font-weight: 500;
        border-bottom: 3px solid transparent;
    }
   .tab-btn.active { color: var(--rouge); border-bottom-color: var(--rouge); }
   .tab-content { display: none; padding: 20px; animation: slideUp 0.4s; }
   .tab-content.active { display: block; }
   .card {
        background: var(--blanc);
        border-radius: 12px;
        padding: 20px;
        margin-bottom: 16px;
        box-shadow: 0 2px 8px rgba(0,0,0,0.08);
    }
   .request-item {
        border: 1px solid var(--gris-clair);
        border-radius: 10px;
        padding: 15px;
        margin-bottom: 12px;
    }
   .request-item.pending { border-left: 4px solid orange; }
   .request-item.confirmed { border-left: 4px solid var(--vert); opacity: 0.7; }
   .badge {
        background: var(--rouge);
        color: var(--blanc);
        padding: 4px 10px;
        border-radius: 12px;
        font-size: 0.8em;
        display: inline-block;
        margin-top: 5px;
    }
</style>
</head>
<body>

<div class="modal" id="modal">
    <div class="modal-box">
        <h3 id="modal-title">Succès</h3>
        <p id="modal-text"></p>
        <button onclick="closeModal()">OK</button>
    </div>
</div>

<div id="admin-login">
    <div class="login-box">
        <h1>🔐 Admin Panel</h1>
        <input type="text" id="admin-user" placeholder="Nom d'utilisateur">
        <input type="password" id="admin-pass" placeholder="Mot de passe">
        <button onclick="adminLogin()">Se connecter</button>
        <p style="text-align: center; margin-top: 15px; color: #666;">Demo: admin / admin123</p>
    </div>
</div>

<div id="admin-dashboard">
    <div class="admin-header">
        <h2>Blue Lock MG - Admin</h2>
    </div>

    <div class="admin-tabs">
        <div class="tab-btn active" onclick="showTab('users')">👥 Utilisateurs</div>
        <div class="tab-btn" onclick="showTab('exchanges')">💎 Échanges</div>
        <div class="tab-btn" onclick="showTab('blog')">📝 Blog</div>
        <div class="tab-btn" onclick="showTab('defi')">⚡ Défis</div>
    </div>

    <div class="tab-content active" id="tab-users">
        <div class="card">
            <h3>Utilisateur inscrit</h3>
            <div id="users-list"></div>
        </div>
    </div>

    <div class="tab-content" id="tab-exchanges">
        <div class="card">
            <h3>Demandes d'échange</h3>
            <div id="exchanges-list"></div>
        </div>
    </div>

    <div class="tab-content" id="tab-blog">
        <div class="card">
            <h3>Ajouter un article Blog</h3>
            <input type="text" id="blog-title" placeholder="Titre">
            <textarea id="blog-desc" placeholder="Description"></textarea>
            <input type="url" id="blog-link" placeholder="Lien Google">
            <button onclick="addBlog()">Publier</button>
        </div>
    </div>

    <div class="tab-content" id="tab-defi">
        <div class="card">
            <h3>Créer un défi</h3>
            <input type="text" id="defi-title" placeholder="Titre du défi">
            <textarea id="defi-desc" placeholder="Description"></textarea>
            <input type="number" id="defi-reward" placeholder="Récompense tokens" value="5">
            <button onclick="addDefi()">Ajouter</button>
        </div>
    </div>
</div>

<script>
const ADMIN_CREDENTIALS = { username: 'admin', password: 'admin123' };

function showModal(title, text) {
    document.getElementById('modal-title').textContent = title;
    document.getElementById('modal-text').textContent = text;
    document.getElementById('modal').classList.add('active');
}
function closeModal() {
    document.getElementById('modal').classList.remove('active');
}

function adminLogin() {
    const user = document.getElementById('admin-user').value;
    const pass = document.getElementById('admin-pass').value;
    if (user === ADMIN_CREDENTIALS.username && pass === ADMIN_CREDENTIALS.password) {
        document.getElementById('admin-login').style.display = 'none';
        document.getElementById('admin-dashboard').style.display = 'block';
        loadDashboard();
    } else {
        showModal('Erreur', 'Identifiants incorrects!');
    }
}

function showTab(tab) {
    document.querySelectorAll('.tab-btn').forEach(btn => btn.classList.remove('active'));
    document.querySelectorAll('.tab-content').forEach(content => content.classList.remove('active'));
    event.target.classList.add('active');
    document.getElementById('tab-' + tab).classList.add('active');
    if (tab === 'exchanges') loadExchanges();
}

function loadDashboard() {
    const user = JSON.parse(localStorage.getItem('user'));
    const usersList = document.getElementById('users-list');
    if (!user) {
        usersList.innerHTML = '<p>Aucun utilisateur.</p>';
        return;
    }
    usersList.innerHTML = `
        <div class="request-item">
            <strong>${user.name}</strong>
            <p>Email: ${user.email}</p>
            <p>Mot de passe: ${user.pass}</p>
            <p>Tokens: <span class="badge">${localStorage.getItem('tokens') || 0}</span></p>
            <input type="number" id="token-amount" placeholder="Tokens" style="width: 100px; margin: 10px 0;">
            <button class="btn-small" onclick="giveTokens('${user.email}')">Offrir Tokens</button>
        </div>
    `;
}

function giveTokens(email) {
    const amount = parseInt(document.getElementById('token-amount').value);
    if (!amount || amount <= 0) {
        showModal('Erreur', 'Montant invalide!');
        return;
    }
    let currentTokens = parseInt(localStorage.getItem('tokens') || '0');
    currentTokens += amount;
    localStorage.setItem('tokens', currentTokens);
    showModal('Succès', `${amount} tokens offerts à ${email}`);
    loadDashboard();
}

function loadExchanges() {
    const exchanges = JSON.parse(localStorage.getItem('exchanges') || '[]');
    const list = document.getElementById('exchanges-list');

    if (exchanges.length === 0) {
        list.innerHTML = '<p>Aucune demande d\'échange.</p>';
        return;
    }

    list.innerHTML = exchanges.map(e => `
        <div class="request-item ${e.status === 'Confirmé'? 'confirmed' : 'pending'}">
            <strong>${e.reward} ${e.game.toUpperCase()}</strong>
            <p><strong>User:</strong> ${e.user}</p>
            <p><strong>UID:</strong> ${e.uid}</p>
            <p><strong>Pseudo:</strong> ${e.pseudo}</p>
            <p><strong>Statut:</strong> ${e.status}</p>
            <small>${e.date}</small>
            ${e.status === 'En attente'?
              `<button class="btn-small" style="margin-top: 10px;" onclick="confirmExchange(${e.id})">Confirmer</button>` :
              ''}
        </div>
    `).join('');
}

function confirmExchange(id) {
    let exchanges = JSON.parse(localStorage.getItem('exchanges') || '[]');
    const index = exchanges.findIndex(e => e.id === id);
    if (index!== -1) {
        exchanges[index].status = 'Confirmé';
        localStorage.setItem('exchanges', JSON.stringify(exchanges));
        showModal('Confirmé', 'Échange marqué comme confirmé!');
        loadExchanges();
    }
}

function addBlog() {
    const title = document.getElementById('blog-title').value;
    const desc = document.getElementById('blog-desc').value;
    const link = document.getElementById('blog-link').value;
    if (!title ||!desc ||!link) {
        showModal('Erreur', 'Remplis tous les champs!');
        return;
    }
    let blogs = JSON.parse(localStorage.getItem('blogs') || '[]');
    blogs.unshift({title, desc, link, date: new Date().toLocaleDateString('fr-FR')});
    localStorage.setItem('blogs', JSON.stringify(blogs));
    showModal('Succès', 'Article publié!');
    document.getElementById('blog-title').value = '';
    document.getElementById('blog-desc').value = '';
    document.getElementById('blog-link').value = '';
}

function addDefi() {
    const title = document.getElementById('defi-title').value;
    const desc = document.getElementById('defi-desc').value;
    const reward = document.getElementById('defi-reward').value;
    if (!title ||!desc) {
        showModal('Erreur', 'Remplis le titre et la description!');
        return;
    }
    let defis = JSON.parse(localStorage.getItem('defis') || '[]');
    defis.unshift({title, desc, reward: reward || 5, date: new Date().toLocaleDateString('fr-FR')});
    localStorage.setItem('defis', JSON.stringify(defis));
    showModal('Succès', 'Défi ajouté!');
    document.getElementById('defi-title').value = '';
    document.getElementById('defi-desc').value = '';
}
</script>
</body>
</html>
